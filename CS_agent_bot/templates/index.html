<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 600px;
    }

    .chat-header {
      background: #4f46e5;
      color: white;
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 10px; height: 10px;
      background: #a3e635;
      border-radius: 50%;
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.user {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      background: #f1f5f9;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.typing {
      background: #f1f5f9;
      color: #94a3b8;
      align-self: flex-start;
      font-style: italic;
    }

    .chat-input {
      display: flex;
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      gap: 10px;
    }

    #msg {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    #msg:focus { border-color: #4f46e5; }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="dot"></div>
      AI Customer Support
    </div>

    <div id="chatbox">
      <div class="msg bot">Hi there! How can I help you today?</div>
    </div>

    <div class="chat-input">
      <input id="msg" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // Generate a stable user_id for this browser session
    const user_id = localStorage.getItem("user_id") || crypto.randomUUID();
    localStorage.setItem("user_id", user_id);

    function sendMessage() {
      const input = document.getElementById("msg");
      const msg = input.value.trim();
      if (!msg) return;

      input.value = "";
      appendMsg("user", msg);

      // Show typing indicator
      const typingEl = appendMsg("typing", "Agent is typing...");

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id, message: msg })
      })
      .then(res => res.json())
      .then(data => {
        typingEl.remove();
        appendMsg("bot", data.reply);
      })
      .catch(() => {
        typingEl.remove();
        appendMsg("bot", "Sorry, something went wrong. Please try again.");
      });
    }

    function appendMsg(type, text) {
      const chatbox = document.getElementById("chatbox");
      const el = document.createElement("div");
      el.className = `msg ${type}`;
      el.textContent = text;
      chatbox.appendChild(el);
      chatbox.scrollTop = chatbox.scrollHeight;
      return el;
    }
  </script>
</body>
</html>
